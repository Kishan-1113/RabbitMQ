name: Docker build push deploy 

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin' # See 'Supported distributions' for available options
        java-version: '21'

    - name: Build jar
      run: ./mvnw clean package DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/messageapp:latest

    - name: Push to docker hub
      run: docker push ${{ secrets.DOCKER_USERNAME }}/messageapp:latest

    - name: SSH and deploy to ec2
      uses: appleboy/ssh-action@v1
      with:
       host: ${{ secrets.EC2_HOST }}
       username: ${{ secrets.EC2_USER }}
       key: ${{ secrets.SSH_KEY }}
       script: |
          docker stop msgapp || true
          docker rm msgapp || true
          docker pull ${{ secrets.DOCKER_USERNAME }}/messageapp:latest
          docker run -d --name msgapp -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/messageapp:latest










    
