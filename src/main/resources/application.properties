spring.application.name=rabbit_config

spring.config.import=optional:file:.env[.properties]

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME_1}
spring.mail.password=${MAIL_PASSWORD_1}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite


## OAuth Values
spring.security.oauth2.client.registration.google.client-id=${OAUTH_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=openid, profile, email, https://www.googleapis.com/auth/gmail.modify, https://www.googleapis.com/auth/pubsub
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub


#Data base
# Postgress configuration
# This url is for docker to connect to local Postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/EmailManagerDB
spring.datasource.username=postgres
spring.datasource.password=${POSTGRES_PASSWORD}

#This line automatically creates tables if not already present
spring.jpa.hibernate.ddl-auto=update

# Print the executed SQL queries
logging.level.org.hibernate.SQL=DEBUG

# Pretty-print and format the SQL 
spring.jpa.properties.hibernate.format_sql=true
